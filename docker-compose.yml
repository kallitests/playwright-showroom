# =============================================================================
# docker-compose.yml — Playwright Showroom
# =============================================================================
# Docker Compose lets you run different test configurations with simple commands.
#
# USAGE:
#   docker compose up smoke          # Run smoke tests only
#   docker compose up e2e            # Run E2E tests only
#   docker compose up regression     # Run regression tests only
#   docker compose up api            # Run API/network tests only
#   docker compose up full           # Run the full suite (all browsers)
#   docker compose up report         # Open the HTML report in your browser
#
# After any run, the HTML report is available at:
#   http://localhost:9323  (when using the `report` service)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # smoke — Run smoke tests only (fastest, ~30s)
  # Use this to quickly verify the app is alive
  # ---------------------------------------------------------------------------
  smoke:
    build:
      context: .
      dockerfile: Dockerfile
    # Override the default CMD to run only smoke tests
    command: npx playwright test tests/smoke/ --project=chromium
    volumes:
      # Mount the test results directory so reports are available on your host
      # After the run: open playwright-report/index.html in your browser
      - ./playwright-report:/app/playwright-report
      - ./test-results:/app/test-results
    environment:
      # CI=true activates stricter mode: no retries UI, fail fast, etc.
      - CI=true

  # ---------------------------------------------------------------------------
  # e2e — Run end-to-end tests only
  # ---------------------------------------------------------------------------
  e2e:
    build:
      context: .
      dockerfile: Dockerfile
    command: npx playwright test tests/e2e/ --project=chromium
    volumes:
      - ./playwright-report:/app/playwright-report
      - ./test-results:/app/test-results
    environment:
      - CI=true

  # ---------------------------------------------------------------------------
  # regression — Run non-regression tests only
  # ---------------------------------------------------------------------------
  regression:
    build:
      context: .
      dockerfile: Dockerfile
    command: npx playwright test tests/regression/ --project=chromium
    volumes:
      - ./playwright-report:/app/playwright-report
      - ./test-results:/app/test-results
    environment:
      - CI=true

  # ---------------------------------------------------------------------------
  # api — Run API/network interception tests only
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: npx playwright test tests/api/ --project=chromium
    volumes:
      - ./playwright-report:/app/playwright-report
      - ./test-results:/app/test-results
    environment:
      - CI=true

  # ---------------------------------------------------------------------------
  # full — Run the complete test suite across all browsers
  # This is what runs in CI on pull requests
  # ---------------------------------------------------------------------------
  full:
    build:
      context: .
      dockerfile: Dockerfile
    # No --project flag = runs all configured projects (chromium, firefox, webkit)
    command: npx playwright test
    volumes:
      - ./playwright-report:/app/playwright-report
      - ./test-results:/app/test-results
    environment:
      - CI=true

  # ---------------------------------------------------------------------------
  # report — Serve the HTML report on localhost:9323
  # ---------------------------------------------------------------------------
  # Run this AFTER one of the test services above:
  #   docker compose up smoke
  #   docker compose up report
  # Then open http://localhost:9323 in your browser
  # ---------------------------------------------------------------------------
  report:
    build:
      context: .
      dockerfile: Dockerfile
    command: npx playwright show-report --host 0.0.0.0 --port 9323
    ports:
      # Map container port 9323 to host port 9323
      - "9323:9323"
    volumes:
      # Read the report generated by a previous test run
      - ./playwright-report:/app/playwright-report
